<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GraphBuilder Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        background: #1a1a1a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #0a0a0a;
      }

      .toolbar {
        position: absolute;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 8px;
        background: rgba(30, 30, 30, 0.95);
        padding: 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(4px);
        z-index: 100;
      }

      button {
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
        white-space: nowrap;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.3);
      }

      button.active {
        background: rgba(100, 180, 255, 0.8);
        border-color: rgba(100, 180, 255, 1);
        color: #fff;
      }

      .info {
        position: absolute;
        bottom: 12px;
        left: 12px;
        background: rgba(30, 30, 30, 0.95);
        padding: 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.8);
        font-size: 12px;
        max-width: 400px;
        line-height: 1.5;
      }

      .divider {
        width: 1px;
        height: 32px;
        background: rgba(255, 255, 255, 0.1);
      }

      label {
        display: flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div class="toolbar">
      <button id="tool-select" class="active">Select</button>
      <button id="tool-pan">Pan</button>
      <div class="divider"></div>
      <button id="btn-node-template-1">Node (Output)</button>
      <button id="btn-node-template-2">Node (I/O)</button>
      <button id="btn-node-template-3">Node (Multi)</button>
      <div class="divider"></div>
      <button id="btn-snap-all">Snap All</button>
      <button id="btn-arrange">Arrange</button>
      <div class="divider"></div>
      <label for="snap-to-grid">
        <input type="checkbox" id="snap-to-grid" />
        Snap to Grid
      </label>
    </div>

    <div class="info">
      <div>
        <strong>GraphBuilder Demo</strong>
      </div>
      <div style="margin-top: 8px">
        <strong>Controls:</strong>
        <div>• Space + Drag: Pan camera</div>
        <div>• Scroll: Zoom</div>
        <div>• Click port: Create edge</div>
        <div>• Ctrl+Click: Delete node</div>
      </div>
    </div>

    <script src="./build/index.browser.js"></script>
    <script>
      // Get the canvas element
      const canvas = document.getElementById('canvas');

      // Define three different node templates
      const nodeTemplates = {
        output: {
          size: { x: 160, y: 80 },
          label: 'Source',
          ports: [
            { id: 'out-right', label: 'Output', type: 'output', side: 'right' },
          ],
          resizable: true,
          deletable: true,
          theme: {
            nodeFillColor: 'rgba(40, 100, 220, 0.2)',
            nodeSelectedFillColor: 'rgba(40, 100, 220, 0.4)',
            nodeBorderColor: 'rgba(40, 100, 220, 0.4)',
            nodeHoveredBorderColor: 'rgba(40, 100, 220, 0.7)',
          },
        },
        ioNode: {
          size: { x: 180, y: 100 },
          label: 'Process',
          ports: [
            { id: 'in-left-1', label: 'Input 1', type: 'input', side: 'left' },
            { id: 'in-left-2', label: 'Input 2', type: 'input', side: 'left' },
            {
              id: 'out-right-1',
              label: 'Output 1',
              type: 'output',
              side: 'right',
              theme: {
                portFillColor: 'rgba(255, 140, 0, 0.2)',
                portHoveredFillColor: 'rgba(255, 140, 0, 0.4)',
                portBorderColor: 'rgba(255, 140, 0, 0.4)',
                portHoveredBorderColor: 'rgba(255, 140, 0, 0.8)',
                portArrowColor: 'rgba(255, 140, 0, 0.6)',
              },
              edgeTheme: {
                edgeColor: 'rgba(255, 140, 0, 0.4)',
                edgeHoveredColor: 'rgba(255, 140, 0, 0.7)',
                edgeHoverOutlineColor: 'rgba(255, 140, 0, 0.2)',
                edgeArrowColor: 'rgba(255, 140, 0, 0.6)',
              },
            },
            {
              id: 'out-right-2',
              label: 'Output 2',
              type: 'output',
              side: 'right',
              theme: {
                portFillColor: 'rgba(50, 200, 100, 0.2)',
                portHoveredFillColor: 'rgba(50, 200, 100, 0.4)',
                portBorderColor: 'rgba(50, 200, 100, 0.4)',
                portHoveredBorderColor: 'rgba(50, 200, 100, 0.8)',
                portArrowColor: 'rgba(50, 200, 100, 0.6)',
              },
              edgeTheme: {
                edgeColor: 'rgba(50, 200, 100, 0.4)',
                edgeHoveredColor: 'rgba(50, 200, 100, 0.7)',
                edgeHoverOutlineColor: 'rgba(50, 200, 100, 0.2)',
                edgeArrowColor: 'rgba(50, 200, 100, 0.6)',
              },
            },
          ],
          resizable: true,
          deletable: true,
        },
        multi: {
          size: { x: 200, y: 140 },
          label: 'Complex',
          ports: [
            { id: 'in-top', label: 'Trigger', type: 'input', side: 'top' },
            { id: 'in-left-1', label: 'Data A', type: 'input', side: 'left' },
            { id: 'in-left-2', label: 'Data B', type: 'input', side: 'left' },
            { id: 'out-right', label: 'Result', type: 'output', side: 'right' },
            { id: 'out-bottom', label: 'Status', type: 'output', side: 'bottom' },
          ],
          resizable: true,
          deletable: true,
        },
      };

      // Initialize GraphBuilder using the default export
      // window.GraphBuilder is the namespace, window.GraphBuilder.default is the constructor
      const builder = new window.GraphBuilder.default(canvas, {
        gridSize: 32,
        snapToGrid: false,
        showGrid: true,
        autoStart: true,
        showPortArrows: true,
        showEdgeArrows: true,
      });

      // Set the default node template for creation
      builder.setCreateNodeTemplate(nodeTemplates.ioNode);

      // Get all tool buttons
      const toolButtons = {
        'tool-select': 'select',
        'tool-pan': 'pan',
      };

      // Update UI to reflect current tool
      function updateToolUI() {
        const currentTool = builder.getTool();
        Object.entries(toolButtons).forEach(([buttonId, toolMode]) => {
          const button = document.getElementById(buttonId);
          if (toolMode === currentTool) {
            button.classList.add('active');
          } else {
            button.classList.remove('active');
          }
        });
      }

      // Attach click handlers to tool buttons
      Object.entries(toolButtons).forEach(([buttonId, toolMode]) => {
        document.getElementById(buttonId).addEventListener('click', () => {
          builder.setTool(toolMode);
          updateToolUI();
        });
      });

      // Attach click handlers to node template buttons
      document.getElementById('btn-node-template-1').addEventListener('click', () => {
        builder.setCreateNodeTemplate(nodeTemplates.output);
        builder.setTool('create-node');
        updateToolUI();
      });

      document.getElementById('btn-node-template-2').addEventListener('click', () => {
        builder.setCreateNodeTemplate(nodeTemplates.ioNode);
        builder.setTool('create-node');
        updateToolUI();
      });

      document.getElementById('btn-node-template-3').addEventListener('click', () => {
        builder.setCreateNodeTemplate(nodeTemplates.multi);
        builder.setTool('create-node');
        updateToolUI();
      });

      // Snap all nodes to grid
      document.getElementById('btn-snap-all').addEventListener('click', () => {
        builder.snapAllToGrid({ snapPositions: true, snapSizes: true });
        console.log('All nodes snapped to grid');
      });

      // Auto-arrange graph
      document.getElementById('btn-arrange').addEventListener('click', async () => {
        console.log('Arranging graph...');
        const result = await builder.arrangeForceDirected({
          iterations: 120,
          repulsionStrength: 15000,
          attractionStrength: 0.02,
          minNodeSpacing: 240,
        });
        console.log('Graph arranged:', result);
      });

      // Attach change handler to snap to grid checkbox
      const snapToGridCheckbox = document.getElementById('snap-to-grid');
      snapToGridCheckbox.addEventListener('change', () => {
        builder.setSnapToGrid(snapToGridCheckbox.checked);
      });

      // ===== EVENT LOGGING =====
      // Subscribe to key events to demonstrate the event system

      builder.on('nodeCreated', ({ node }) => {
        console.log(`✓ Node created: "${node.label}" (ID: ${node.id})`);
      });

      builder.on('nodeRemoved', ({ nodeId, node }) => {
        console.log(`✗ Node removed: "${node.label}" (ID: ${nodeId})`);
      });

      builder.on('nodeMoved', ({ nodeId, from, to }) => {
        console.log(`↦ Node moved: (${from.x}, ${from.y}) → (${to.x}, ${to.y})`);
      });

      builder.on('edgeCreated', ({ edge }) => {
        console.log(`↔ Edge created: ${edge.a.nodeId}:${edge.a.portId} ↔ ${edge.b.nodeId}:${edge.b.portId}`);
      });

      builder.on('edgeRemoved', ({ edge }) => {
        console.log(`✗ Edge removed: ${edge.a.nodeId}:${edge.a.portId} ↔ ${edge.b.nodeId}:${edge.b.portId}`);
      });

      builder.on('toolChanged', ({ from, to }) => {
        console.log(`🔧 Tool changed: ${from} → ${to}`);
      });

      // Add some example nodes to the graph
      builder.createNode({ x: 100, y: 100 }, nodeTemplates.output);
      builder.createNode({ x: 400, y: 150 }, nodeTemplates.ioNode);
      builder.createNode({ x: 700, y: 100 }, nodeTemplates.multi);

      // Create some example edges
      builder.createEdge(
        { nodeId: builder.getGraph().nodes[0].id, portId: 'out-right' },
        { nodeId: builder.getGraph().nodes[1].id, portId: 'in-left-1' }
      );

      // Initial UI update
      updateToolUI();
    </script>
  </body>
</html>
